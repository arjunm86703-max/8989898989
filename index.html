<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Will You Be Mine?</title>
<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(45deg,#ff4d6d,#ff9eb5);
font-family:Arial;
overflow:hidden;
}
.box{
text-align:center;
background:#ffffff33;
padding:30px;
border-radius:20px;
backdrop-filter:blur(10px);
}
h1{
color:white;
animation:glow 2s infinite;
}
@keyframes glow{
50%{color:yellow;}
}
button{
padding:12px 25px;
margin:10px;
font-size:18px;
border:none;
border-radius:25px;
cursor:pointer;
}
#yes{background:#00e676;}
#no{
background:#ff1744;
position:absolute;
}
.heart{
position:fixed;
top:-20px;
font-size:20px;
animation:fall 5s linear infinite;
}
@keyframes fall{
to{
transform:translateY(110vh);
}
}
</style>
</head>
<body>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<div class="box">
<h1>💖 hy penne ketti vitti kond potte nine ee chettan? 😹💖</h1>
<button id="yes">YES ❤️</button>
<button id="no">NO 💔</button>
<h2 id="msg"></h2>
</div>

<script>
document.body.onclick=()=>music.play();

for(let i=0;i<40;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💖";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(3+Math.random()*3)+"s";
document.body.appendChild(h);
}

let no=document.getElementById("no");

function move(){
no.style.left=Math.random()*(window.innerWidth-100)+"px";
no.style.top=Math.random()*(window.innerHeight-60)+"px";
}

no.onmouseover=move;
no.onclick=move;

yes.onclick=()=>{
msg.innerHTML="🌹 I Love You Forever 🌹";
alert("❤️ Thank You ❤️");
};
</script>

</body>
</html>
